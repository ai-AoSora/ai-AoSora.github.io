<!DOCTYPEhtml>
<html lang="ja">
  <head>
    <title>Ai 青空</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  </head>
  <body>
    <h2>Ai 青空</h2>
    <div class="input-area">
      <input type="text" placeholder="ここに文章を入力..." required name="input-text" id="input-textarea" class="input-text">
      <button type="submit" class="btn-text-submit"><span class="material-symbols-outlined">send</span></button>
    </div>
    <style>
      body{ display:flex; flex-direction:column; padding:0; margin:0; background-color:#fff; }
      button{ cursor:pointer; }
      .input-area{ width:70%; height:max-content; display:flex; flex-direction:row; align-items:center; justify-content:center; position:fixed; bottom:10px; left:50%; transform:translateX(-50%); padding:3px; margin:5px; border-radius:20px; box-shadow:0px 2px 5px 1px #8A8C8E; }
      .input-text{ width:80%; height:50px; border:none; font-size:15px; }
      .btn-text-submit{ border-radius:50%; width:45px; height:45px; padding:0; margin:5px; border:none; background-color:#0075DA; }
      .btn-text-submit .material-symbols-outlined{ font-size:20px; padding:0; margin:0; color:#fff; }
    </style>
  </body>
</html>
