<!DOCTYPEhtml>
<html lang="ja">
  <head>
    <title>Ai 青空</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://ai-aosora.github.io/dictionary.js"></script>
    <script src="https://ai-aosora.github.io/think1.js"></script>
  </head>
  <body>
    <h2>Ai 青空</h2>
    <div class="talk-area">
      <div class="start-menu">
        <h2>こんにちは、ai青空です。</h2>
        <p>まずはこんな質問から</p>
        <button>こんにちは</button><button>今何時？</button>
      </div>
      <div id="talk_message"></div>
    </div>
    <div class="input-area">
      <form action="" class="input-form-area" onsubmit="event.preventDefault();/* 送信時にページのリロードを防止 */ send_question(document.getElementById('input-textarea').value);/* 入力データを取得して関数呼び出し */">
        <input type="text" placeholder="ここに文章を入力..." required name="input-text" id="input-textarea" class="input-text">
        <button type="submit" class="btn-text-submit" ><span class="material-symbols-outlined">send</span></button>
      </form>
    </div>
    <style>
      body{ display:flex; flex-direction:column; padding:0; margin:0; background-color:#fff; }
      button{ cursor:pointer; }
      .input-area{ width:60%; height:max-content; display:flex; flex-direction:row; align-items:center; justify-content:center; position:fixed; bottom:10px; left:50%; transform:translateX(-50%); padding:3px; margin:5px; border-radius:20px; box-shadow:0px 2px 5px 1px #8A8C8E; }
      .input-text{ width:95%; height:50px; border:none; font-size:15px; }
      .input-form-area{ width:80% }
      .btn-text-submit{ border-radius:50%; width:45px; height:45px; padding:0; margin:5px; border:none; background-color:#0075DA; position:absolute; right:5px; transition:all 0.2s ease; }
      .btn-text-submit:hover{ background-color:#1e8be8; }
      .btn-text-submit:active{ background-color:#0269c2; }
      .btn-text-submit .material-symbols-outlined{ font-size:20px; padding:0; margin:0; color:#fff; }
      
      .talk-area{ width:100%; height:100%; margin:0; padding:0; display:flex; flex-direction:column; aling-items:center; judtify-content:center; flex-wrap:wrap; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    </style>
  </body>
</html>
